workflows:
  ios_unsigned_ipa_trollstore:
    name: OpenClaw iOS unsigned IPA (TrollStore)
    instance_type: mac_mini_m2
    max_build_duration: 90

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    environment:
      xcode: latest
      vars:
        SCHEME: OpenClaw
        PROJECT_PATH: apps/ios/OpenClaw.xcodeproj

    scripts:
      - name: Show toolchain
        script: |
          xcodebuild -version
          swift --version
          node -v || true
          pnpm -v || true

      - name: Install required tooling (no corepack)
        script: |
          set -euo pipefail
          brew install xcodegen swiftlint swiftformat
          npm uninstall -g corepack || true
          npm install -g pnpm@10.23.0
          export PATH="$(npm prefix -g)/bin:$PATH"
          which pnpm
          pnpm -v

      - name: Install dependencies
        script: |
          set -euo pipefail
          export PATH="$(npm prefix -g)/bin:$PATH"
          pnpm install --frozen-lockfile --ignore-scripts=false

      - name: Configure iOS signing files (repo flow)
        script: |
          set -euo pipefail
          chmod +x ./scripts/ios-configure-signing.sh || true
          ./scripts/ios-configure-signing.sh || true

      - name: Generate Xcode project
        script: |
          set -euo pipefail
          cd apps/ios
          xcodegen generate
          test -d OpenClaw.xcodeproj

      - name: CI hotfix for Swift 6.2 concurrency check
        script: |
          set -euo pipefail
          FILE="apps/ios/Sources/Gateway/GatewaySettingsStore.swift"
          if grep -q "private static let isoFormatter" "$FILE"; then
            # Swift 6.2 treats ISO8601DateFormatter static storage as non-Sendable shared mutable state.
            # Mark as nonisolated(unsafe) for CI unsigned build.
            sed -i '' 's/private static let isoFormatter:/nonisolated(unsafe) private static let isoFormatter:/g' "$FILE"
          fi

      - name: Build unsigned .app
        script: |
          set -euo pipefail
          # Important: do NOT force -sdk iphoneos here.
          # The OpenClaw scheme includes watch targets; forcing iphoneos makes Xcode
          # try resolving watch product types in the iOS SDK domain and fails.
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA for TrollStore
        script: |
          set -euo pipefail

          APP_PATH="$(find "$CM_BUILD_DIR/DerivedData/Build/Products/Release-iphoneos" -maxdepth 1 -name "*.app" | head -n 1)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in Release-iphoneos"
            ls -la "$CM_BUILD_DIR/DerivedData/Build/Products" || true
            exit 1
          fi

          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -R "$APP_PATH" "$CM_BUILD_DIR/Payload/"

          # Ensure no provisioning profile is embedded for unsigned TrollStore flow
          rm -f "$CM_BUILD_DIR/Payload/"*.app/embedded.mobileprovision || true

          cd "$CM_BUILD_DIR"
          zip -qry "OpenClaw-unsigned-trollstore.ipa" Payload
          ls -lah "OpenClaw-unsigned-trollstore.ipa"

    artifacts:
      - $CM_BUILD_DIR/OpenClaw-unsigned-trollstore.ipa
      - $CM_BUILD_DIR/DerivedData/Build/Products/Release-iphoneos/*.app/**
